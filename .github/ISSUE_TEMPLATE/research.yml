name: Research
description: 创建研究型 Work Item
title: "[Work Item] Research: "
labels:
  - level:work-item
  - type:research
  - status:needs-research
body:
  - type: textarea
    id: question
    attributes:
      label: 研究问题
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: 要解锁的决策
    validations:
      required: true
  - type: textarea
    id: targets
    attributes:
      label: 调研对象
      description: 例如 ccusage、CodexBar、CodexMonitor、openai/codex 或 SQLite/DuckDB。
  - type: textarea
    id: deliverables
    attributes:
      label: 输出物
    validations:
      required: true
  - type: textarea
    id: criteria
    attributes:
      label: 判断标准
    validations:
      required: true
  - type: textarea
    id: conclusion
    attributes:
      label: 结论
  - type: textarea
    id: followups
    attributes:
      label: Follow-up issues
