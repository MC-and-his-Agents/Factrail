name: Feature Requirement
description: 创建可交付功能要求
title: "[FR] "
labels:
  - level:fr
  - type:feature
body:
  - type: input
    id: phase
    attributes:
      label: 所属 Phase
      placeholder: "[Phase] v0.1 Local Codex Usage MVP"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 用户/系统问题
      description: 说明这个 FR 要解决的问题。
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 功能范围
      description: 说明功能边界和主要行为。
    validations:
      required: true
  - type: textarea
    id: data_impact
    attributes:
      label: 数据影响
      description: 说明 schema、store、report、export、privacy 或 attribution 影响。
  - type: textarea
    id: in_scope
    attributes:
      label: In scope
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: 可测试、可审查的验收标准。
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖
      description: 依赖的 FR、Work Item、外部事实源或决策。
  - type: textarea
    id: risks
    attributes:
      label: 风险
